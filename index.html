<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard Gamificado</title>
</head>
<body>
    <h1>Bem-vindo Guerreiro!</h1>
    <input type="text" name="input" id="input">
    <button type="submit" id="adicionar">Adicionar</button>
    <ul id="lista_de_tarefas"></ul>

<script>
    //VARIAVEIS
        const $input = document.querySelector("#input")
        const $adicionar = document.querySelector("#adicionar")
        const $listaDeTarefas = document.querySelector("#lista_de_tarefas") 

        let listaDeTarefas = []
        let idTarefa = 0

    //FUNCÕES
        $adicionar.addEventListener("click", () => { 
            if ($input.value == "") {
                return
            }
            listaDeTarefas.push({ id: idTarefa++, texto: $input.value, concluida: false }) //adiciona input a array listaDeTarefas, bastando atualizarLista() pegar as tarefas nela
            atualizarLista()
            $input.value = "" 
            }) 
            
        function atualizarLista(){
            $listaDeTarefas.innerHTML = "" // limpa HTML antes

            for (let i = 0; i < listaDeTarefas.length; i++) {
                const tarefa = listaDeTarefas[i]

                const $tarefa = document.createElement("li")
                $tarefa.dataset.id = tarefa.id

                const $textoSpan = document.createElement("span")
                $textoSpan.textContent = "🌌 " + tarefa.texto

                const $editar = document.createElement("button")
                $editar.textContent = "Editar"

                $tarefa.appendChild($textoSpan)
                $tarefa.appendChild($editar)
                $listaDeTarefas.appendChild($tarefa)

                $editar.addEventListener("click", (event) => {
                    const li = event.target.parentElement
                    const id = Number(li.dataset.id)
                    const tarefaEncontrada = listaDeTarefas.find(t => t.id === id)

                    // cria input e botão salvar
                    const $inputEdicao = document.createElement("input")
                    $inputEdicao.value = tarefaEncontrada.texto

                    const $salvar = document.createElement("button")
                    $salvar.textContent = "Salvar"

                    // limpa li e adiciona input + botão salvar
                    li.innerHTML = ""
                    li.appendChild($inputEdicao)
                    li.appendChild($salvar)

                    $salvar.addEventListener("click", () => {
                        if ($inputEdicao.value.trim() !== "") {
                            tarefaEncontrada.texto = $inputEdicao.value
                            atualizarLista()
                        }
                    })
                })
            }
        }

        function editarTarefa() {

        }
    
</script>
</html>
